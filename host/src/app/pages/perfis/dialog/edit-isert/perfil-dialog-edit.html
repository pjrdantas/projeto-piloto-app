<h2 mat-dialog-title>
  {{ data ? 'Editar Perfil' : 'Novo Perfil' }}
</h2>

<mat-dialog-content>

  <form [formGroup]="form" class="form-grid">


      <mat-form-field appearance="outline" floatLabel="always" class="form-field">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nmPerfil" placeholder="Nome do perfil" />
        @if (form.get('nmPerfil')?.hasError('required')) {
          <mat-error>Nome é obrigatório</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline" class="permissao-field">
        <mat-label>Permissão</mat-label>
        <mat-select formControlName="permissaoSelecionada">
          <mat-option *ngFor="let p of permissoesDisponiveis" [value]="p.id">
            {{ p.nmPermissao }}
          </mat-option>
        </mat-select>
        @if (form.get('permissaoSelecionada')?.hasError('required')) {
          <mat-error>Permissão é obrigatória</mat-error>
        }
      </mat-form-field>

      <button mat-raised-button type="button" (click)="addPermissao()" class="botao-adicionar">
        <mat-icon>add</mat-icon>
        Adicionar
      </button>

  </form>

  <!-- Corrigido: usando o objeto dataSource definido no TS -->
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let p">{{ p.id }}</td>
    </ng-container>

    <ng-container matColumnDef="nmPermissao">
      <th mat-header-cell *matHeaderCellDef>Permissão</th>
      <td mat-cell *matCellDef="let p">{{ p.nmPermissao }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button color="warn" (click)="removePermissao(p)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10]"
    showFirstLastButtons
    aria-label="Selecionar página"
  ></mat-paginator>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button mat-button type="button" (click)="cancel()" class="botao-cancel">
    <mat-icon>cancel</mat-icon>
    Cancelar
  </button>

  <button mat-raised-button (click)="save()" [disabled]="form.invalid" class="botao-ok">
    <mat-icon>check_circle</mat-icon>
    Salvar
  </button>
</mat-dialog-actions>
